<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Prospective Students</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#5E7AC4',
                        bgSoft: '#F4F7FE'
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans antialiased h-screen bg-bgSoft flex items-center justify-center">

    <div class="flex flex-col md:flex-row w-full h-full">
        
        <div class="hidden md:flex flex-col justify-center w-1/2 bg-primary text-white p-16">
            <h1 class="text-5xl font-bold mb-8 leading-tight">
                Hello Prospective<br>Students
            </h1>
            <div class="flex justify-center mb-8">
                <img src="ASSET/UTS/gambar_login page.png" alt="Illustration" class="w-80 object-contain">
            </div>
            <p class="text-lg leading-relaxed max-w-md">
                Unlock your professional potential. Learn from industry leaders and stay ahead of the competition.
            </p>
        </div>

        <div class="flex flex-col justify-center w-full md:w-1/2 bg-bgSoft px-8 sm:px-20">
            <div class="max-w-md w-full mx-auto text-center">
                <h2 class="text-2xl font-bold text-slate-800 mb-1">LOGIN PAGE</h2>
                <p class="text-sm text-slate-500 mb-8 font-semibold">Masukkan Username dan Password Anda</p>
                
                <form id="formLogin" class="space-y-4">
                    <div>
                        <input type="email" id="emailInput" placeholder="Email Address" 
                            class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:border-primary text-center text-primary font-bold shadow-sm placeholder-primary/60">
                    </div>
                    <div>
                        <input type="password" id="passwordInput" placeholder="Password" 
                            class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:border-primary text-center text-primary font-bold shadow-sm placeholder-primary/60">
                    </div>
                    <button type="submit" class="w-full bg-primary text-white py-3 rounded-lg font-bold shadow hover:bg-blue-800 transition">
                        Login
                    </button>
                </form>

                <div class="flex items-center justify-center my-6 space-x-2">
                    <div class="h-px bg-gray-300 w-16"></div>
                    <span class="text-xs text-slate-400 font-bold">Or Login With</span>
                    <div class="h-px bg-gray-300 w-16"></div>
                </div>

                <button class="w-full bg-white border border-gray-200 py-3 rounded-lg font-bold text-slate-700 shadow-sm hover:bg-gray-50 transition flex items-center justify-center gap-3">
                    <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Sign in with Account Google
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
