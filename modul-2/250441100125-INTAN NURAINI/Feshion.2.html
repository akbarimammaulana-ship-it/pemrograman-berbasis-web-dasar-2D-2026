<!DOCTYPE html>
<html>
<head>
    <title>Landing Page Fashion</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #ffffff;
        }

        .header {
            background-color: orange;
            color: white;
            padding: 15px;
        }

        .logo {
            float: left;
        }

        .logo img {
            height: 55px;
        }

        .menu {
            float: right;
        }

        .menu a {
            color: rgb(249, 246, 246);
            margin-left: 15px;
            text-decoration: none;
        }

        .menu a:hover {
            text-decoration: underline;
        }

        .hero {
            background-color: #f4f3f3;
            padding: 30px;
        }

        .hero-text {
            width: 45%;
            float: left;
        }

        .hero-text h1 {
            color: #333;
        }

        .hero-text p {
            color: #666;
        }


        .button {
            background-color: orange;
            color: white;
            padding: 10px;
            display: inline-block;
            margin-top: 10px;
        }

        .produk-section {
            background-color: #4a47a3;
            padding: 20px;
            color: white;
        }

        .produk-container {
            white-space: nowrap;
            overflow-x: auto;
        }

        .produk {
            display: inline-block;
            width: 150px;
            background-color: white;
            color: black;
            margin-right: 10px;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }

        .produk img {
            height: 120px;
        }

        .produk p {
            margin: 5px ;
        }

        .harga {
            color: red;
        }

        .produk:hover {
            background-color: #a18f8f;
        }

        .clear {
            clear: both;
        }

    </style>
</head>

<body>

    <div class="header">
        <div class="logo">
            <img src="logo store.jpeg">
        </div>

        <div class="menu">
            <a href="#">Home</a>
            <a href="#">Product</a>
            <a href="#">New Arrival</a>
            <a href="#">Services</a>
        </div>

        <div class="clear"></div>
    </div>

    <div class="hero">

        <div class="hero-text">
            <h1>Trend Fashion 2026</h1>
            <p>Koleksi fashion terbaru dengan kualitas premium dan harga terjangkau.</p>
            <div class="button">SHOP NOW</div>
        </div>

        <div class="clear"></div>
    </div>

    <div class="produk-section">
        <h2>Summer Sale</h2>

        <div class="produk-container">

            <div class="produk">
                <img src="Gambar 1.jpeg">
                <p>Baju Casual</p>
                <p class="harga">Rp.400.000.00</p>
            </div>

            <div class="produk">
                <img src="Gambar 2.jpeg">
                <p>Baju Trendy</p>
                <p class="harga">Rp.350.000.00</p>
            </div>

            <div class="produk">
                <img src="Gambar 3.jpeg">
                <p>Baju Modern</p>
                <p class="harga">Rp.177.000.00</p>
            </div>

            <div class="produk">
                <img src="Gambar 4.jpeg">
                <p> Baju Atasan </p>
                <p class="harga">Rp.100.000.00</p>
            </div>

            <div class="produk">
                <img src="Gambar 5.jpeg">
                <p>Baju Tidur</p>
                <p class="harga">Rp.88.000.00</p>
            </div>

        </div>
    </div>


</body>
</html>
